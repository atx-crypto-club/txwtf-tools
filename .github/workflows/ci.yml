name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --all-extras

      - name: Run unit tests
        run: poetry run pytest tests/ -m "not integration and not live" -v --tb=short

      - name: Run integration tests
        run: poetry run pytest tests/ -m "integration and not live" -v --tb=short

  live-backup-test:
    runs-on: [self-hosted, linux, incus, star-00]
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install .
          .venv/bin/pip install pytest pytest-asyncio

      - name: Run live backup round-trip test
        timeout-minutes: 20
        env:
          TXWTF_SFTP_HOST: star-01
          TXWTF_SFTP_USER: tfx
          TXWTF_SFTP_DIR: /media/catx-easystore/txwtf-tools-tests
          TXWTF_INCUS_TARGET: star-00
          TXWTF_BASE_IMAGE: ubuntu-24.04-container
          TXWTF_INCUS_API: https://10.66.77.217:8443
        run: .venv/bin/pytest tests/test_live_backup.py -m live -v --tb=long -s

      - name: Cleanup on failure
        if: failure()
        run: |
          # Scoped cleanup: only delete resources belonging to THIS run's
          # RUN_ID so concurrent runs on other runners are not disturbed.
          RUN_ID=""
          if [ -f .txwtf-ci-run-id ]; then
            RUN_ID=$(cat .txwtf-ci-run-id)
          fi
          if [ -z "$RUN_ID" ]; then
            echo "WARNING: no .txwtf-ci-run-id found, skipping cleanup"
            exit 0
          fi
          echo "Cleaning up resources for RUN_ID=$RUN_ID"
          for c in "txwtf-ci-${RUN_ID}" "txwtf-ci-${RUN_ID}-restored"; do
            incus delete "$c" --force 2>/dev/null || true
          done
          for img in "txwtf-ci-${RUN_ID}-img" "txwtf-ci-${RUN_ID}-restored-img"; do
            incus image delete "$img" 2>/dev/null || true
          done
          ssh -o StrictHostKeyChecking=no tfx@star-01 "rm -f /media/catx-easystore/txwtf-tools-tests/txwtf-ci-${RUN_ID}-backup.enc" 2>/dev/null || true
          # Multi-VM test resources
          for i in 0 1; do
            c="txwtf-ci-${RUN_ID}-m-${i}"
            incus delete "$c" --force 2>/dev/null || true
            incus delete "${c}-restored" --force 2>/dev/null || true
            incus image delete "default-${c}-backup" 2>/dev/null || true
            ssh -o StrictHostKeyChecking=no tfx@star-01 "rm -f /media/catx-easystore/txwtf-tools-tests/default-${c}-backup.img.gz.enc" 2>/dev/null || true
          done
          # Also try deleting the image by fingerprint (covers the case
          # where import succeeded but alias creation didn't).
          if [ -f .txwtf-ci-fingerprint ]; then
            FP=$(cat .txwtf-ci-fingerprint)
            incus image delete "$FP" 2>/dev/null || true
            rm -f .txwtf-ci-fingerprint
          fi
          rm -f .txwtf-ci-run-id
